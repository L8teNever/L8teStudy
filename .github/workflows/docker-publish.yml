name: Build and Push Docker Image

on:
  push:
    branches: [ main, dev, 'backup/**' ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Get version from file
      id: version
      run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT
      
    - name: Determine Docker tags
      id: tags
      run: |
        BRANCH="${GITHUB_REF#refs/heads/}"
        if [ "$BRANCH" = "main" ]; then
          echo "TAGS=${{ secrets.DOCKER_USERNAME }}/l8testudy:latest,${{ secrets.DOCKER_USERNAME }}/l8testudy:${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
        else
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "TAGS=${{ secrets.DOCKER_USERNAME }}/l8testudy:${SAFE_BRANCH}" >> $GITHUB_OUTPUT
        fi

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.tags.outputs.TAGS }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
